version: "3.9"

services:
  # ── Load Balancer ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: chokey-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app1:
        condition: service_started
      app2:
        condition: service_started
      app3:
        condition: service_started
    restart: unless-stopped

  # ── API Instances (scalable) ───────────────────────────────
  app1: &app
    build: .
    container_name: chokey-api-1
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://chokey:chokey@pgbouncer:6432/chokey"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    restart: unless-stopped

  app2:
    <<: *app
    container_name: chokey-api-2
    ports:
      - "8001:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  app3:
    <<: *app
    container_name: chokey-api-3
    ports:
      - "8002:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  # ── Connection Pooler ──────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:1.23
    container_name: chokey-pgbouncer
    environment:
      DB_USER: chokey
      DB_PASSWORD: chokey
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: chokey
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: "50"
      MAX_CLIENT_CONN: "300"
      MAX_DB_CONNECTIONS: "75"
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pgbouncer:/etc/pgbouncer:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h pgbouncer -p 6432 -U chokey"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: chokey-db
    environment:
      POSTGRES_USER: chokey
      POSTGRES_PASSWORD: chokey
      POSTGRES_DB: chokey
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chokey"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Cache / Queue ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: chokey-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Async Workers ──────────────────────────────────────────
  celery:
    build: .
    container_name: chokey-celery
    env_file: .env
    environment:
      DATABASE_URL: "postgresql+asyncpg://chokey:chokey@pgbouncer:6432/chokey"
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=8
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: chokey-celery-beat
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: celery -A app.tasks.celery_app beat --loglevel=info
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
