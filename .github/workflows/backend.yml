name: Backend CI/CD

on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']

env:
  PYTHON_VERSION: '3.12'
  WORKING_DIR: './backend'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff
      - name: Run Ruff linter
        run: ruff check app/ tests/ scripts/
      - name: Run Ruff formatter check
        run: ruff format --check app/ tests/ scripts/

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: ${{ env.WORKING_DIR }}/coverage.xml
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ${{ env.WORKING_DIR }}/coverage.xml
          flags: backend
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t chokey-api:${{ github.sha }} .
      - name: Verify image builds and runs
        run: |
          docker run --rm chokey-api:${{ github.sha }} python -c "from app.main import app; print('App loads OK')"

  deploy-render:
    needs: [lint, test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        run: |
          echo "Deploying to Render via deploy hook..."
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        shell: bash

  deploy-docker:
    needs: [lint, test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.WORKING_DIR }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/chokey-api:latest
            ${{ secrets.DOCKER_USERNAME }}/chokey-api:${{ github.sha }}
